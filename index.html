<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Calc • Less Zero</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="panel">
      <div class="brand-bar">
        <div class="brand-name">Less Zero</div>
        <div class="brand-tag">Smart Calculator</div>
      </div>

      <div class="display-shell">
        <div class="display-top">Type numbers, or use K / H / L keys</div>
        <div id="calculator-display" class="display-value">0</div>
      </div>

      <div class="button-grid" role="application" aria-label="Calculator buttons">
        <button class="btn accent" data-action="clear">AC</button>
        <button class="btn" data-action="delete">DEL</button>
        <button class="btn" data-value="%">%</button>
        <button class="btn operator" data-value="/">÷</button>

        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn operator" data-value="*">×</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn operator" data-value="-">−</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn operator" data-value="+">+</button>

        <button class="btn unit" data-value="K">K</button>
        <button class="btn" data-value="0">0</button>
        <button class="btn" data-value=".">.</button>
        <button class="btn equals" data-action="equals">=</button>
      </div>

      <div class="hint-panel">
        <p><strong>Unit shortcuts:</strong> <span class="hint-pill">H</span>=100, <span class="hint-pill">K</span>=1,000, <span class="hint-pill">L</span>=100,000</p>
        <p>Examples: <span class="hint-pill">5K</span> → 5,000 · <span class="hint-pill">2L</span> → 200,000</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
